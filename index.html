<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<title>Geo Game</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body { margin: 0; font-family: Arial; }
#map { height: 70vh; }

.leaflet-container { cursor: crosshair !important; }

#hud {
  display: flex;
  justify-content: space-between;
  background: #111;
  color: #eee;
  padding: 10px;
}

#left { display: flex; flex-direction: column; gap: 10px; }

.bar { width: 50px; height: 6px; background: #333; }
.bar-inner { height: 100%; }
.hp { background: red; }
.ap { background: yellow; }

.btn-grid {
  display: grid;
  grid-template-columns: repeat(2, 120px);
  gap: 5px;
}

button {
  background: #333;
  color: white;
  border: none;
  padding: 6px;
  cursor: pointer;
}

#log {
  width: 300px;
  height: 140px;
  overflow-y: auto;
  background: black;
  padding: 5px;
  font-size: 12px;
  border: 1px solid #555;
}

#inventory {
  display: grid;
  grid-template-columns: repeat(4, 70px);
  gap: 10px;
}

.slot {
  width: 70px;
  height: 70px;
  background: #444;
  border: 1px solid #888;
  position: relative;
}

.item { width: 100%; height: 100%; }

.delete-btn {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 20%;
  height: 20%;
}

/* LOOT */
#lootScreen {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  z-index:9999;
}

#lootBox {
  background:#222;
  padding:20px;
  border:1px solid #555;
  min-width:220px;
}

#lootResult {
  margin-top:10px;
  min-height:40px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="hud">

  <div id="left">

    <div>
      HP: <span id="hpText"></span>
      <div class="bar"><div id="hpBar" class="bar-inner hp"></div></div>
    </div>

    <div>
      AP: <span id="apText"></span>
      <div class="bar"><div id="apBar" class="bar-inner ap"></div></div>
    </div>

    <div class="btn-grid">
      <button>Журнал</button>
      <button onclick="actionLook()">👀 Роздивитися</button>

      <button>Мапа</button>
      <button>...</button>

      <button>...</button>
      <button onclick="actionRest()">💤 Відпочити</button>
    </div>

  </div>

  <div id="log"></div>
  <div id="inventory"></div>

</div>

<!-- LOOT -->
<div id="lootScreen">
  <div id="lootBox">
    <h3 id="lootTitle"></h3>
    <div id="lootActions"></div>
    <div id="lootResult"></div>
    <button onclick="closeLoot()">Вийти</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// --- CITIES ---
const cities = [
[50.45,30.52],[49.84,24.03],[48.92,24.71],[46.48,30.72],[49.99,36.23],
[48.46,35.05],[47.84,35.14],[46.97,31.99],[50.75,25.33],[49.55,25.59],
[48.62,22.30],[48.51,32.26],[49.42,26.98],[50.62,26.25],[50.91,34.80],
[49.23,28.48],[49.44,32.06],[49.55,34.59],[48.29,25.94],[47.91,33.39]
];

// --- CONFIG ---
const ITEM_IMAGES = {
  "Лом":"lom.jpg","Ключ":"key.jpg","Фляга":"flask.jpg",
  "Сухар":"sukhar.jpg","Ніж":"knife.jpg","Бинт":"bandage.jpg"
};

const CONSUMABLES = ["Фляга","Сухар","Бинт"];
const items = Object.keys(ITEM_IMAGES);

const POI_TYPES = {
  house: {name:"Дім", img:"house.png"},
  warehouse: {name:"Склад", img:"warehouse.png"}
};

// --- STATE ---
let state = { hp:100, ap:100, inventory:new Array(8).fill(null) };

let visited = {};
let poiList = [];
let routeHistory = [];
let currentPOI = null;

let isMoving = false;
let isResting = false;
let draggedIndex = null;

// --- MAP ---
const start=cities[Math.floor(Math.random()*cities.length)];
const map=L.map('map').setView(start,13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let playerMarker=L.circleMarker(start,{radius:8,color:'#aaa'}).addTo(map);

// --- LOG ---
const logEl=document.getElementById('log');
function log(msg){
  const d=document.createElement('div');
  d.innerText="> "+msg;
  logEl.prepend(d);
}

// --- STATS ---
function updateStats(){
  hpText.innerText = `${Math.round(state.hp)}/100`;
  apText.innerText = `${Math.round(state.ap)}/100`;
  hpBar.style.width = (state.hp/100*50)+"px";
  apBar.style.width = (state.ap/100*50)+"px";
}

// --- INVENTORY ---
const inventoryEl=document.getElementById('inventory');

function renderInventory(){
  inventoryEl.innerHTML="";

  state.inventory.forEach((item,i)=>{
    const slot=document.createElement('div');
    slot.className='slot';

    slot.ondragover=(e)=>e.preventDefault();
    slot.ondrop=()=>{
      if(draggedIndex===null)return;
      [state.inventory[i], state.inventory[draggedIndex]] =
      [state.inventory[draggedIndex], state.inventory[i]];
      renderInventory();
    };

    if(item){
      const img=document.createElement('img');
      img.src=`images/items/${ITEM_IMAGES[item]}`;
      img.className='item';

      img.draggable=true;
      img.ondragstart=()=>draggedIndex=i;
      img.ondragend=()=>draggedIndex=null;

      img.onclick=()=>useItem(item,i);

      const del=document.createElement('img');
      del.src="images/UI/cross.jpg";
      del.className="delete-btn";
      del.onclick=(e)=>{
        e.stopPropagation();
        state.inventory[i]=null;
        renderInventory();
      };

      slot.appendChild(img);
      slot.appendChild(del);
    }

    inventoryEl.appendChild(slot);
  });
}

function useItem(item,i){
  if(!CONSUMABLES.includes(item)){ log("Не можна"); return; }

  if(item==="Фляга") state.ap+=5;
  if(item==="Сухар") state.ap+=3;
  if(item==="Бинт") state.hp+=25;

  state.inventory[i]=null;
  updateStats();
  renderInventory();
}

// --- ROUTE (НЕ ЧІПАЛИ) ---
async function getRoute(from,to){
  const res=await fetch(`https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`);
  const data=await res.json();
  return data.routes[0];
}

function drawRoute(route){
  const coords=route.geometry.coordinates.map(c=>[c[1],c[0]]);
  routeHistory.push(coords);

  routeHistory.forEach((path,i)=>{
    L.polyline(path,{
      color:i===routeHistory.length-1?'green':'red',
      weight:i===routeHistory.length-1?6:3,
      opacity:i===routeHistory.length-1?1:0.3
    }).addTo(map);
  });

  return coords;
}

function distance(a,b){
  const R=6371000;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;
  const x=dLng*Math.cos((a.lat+b.lat)/2*Math.PI/180);
  return Math.sqrt(dLat*dLat+x*x)*R;
}

function move(coords){
  if(isMoving||state.ap<=0||isResting)return;

  isMoving=true;
  let i=0;

  function step(){
    if(i>=coords.length-1){isMoving=false;return;}

    const a={lat:coords[i][0],lng:coords[i][1]};
    const b={lat:coords[i+1][0],lng:coords[i+1][1]};

    const dist=distance(a,b);
    const time=(dist/1000)*7000;

    state.ap -= (dist/1000)*10;

    playerMarker.setLatLng(a);
    i++;

    updateStats();
    setTimeout(step,time);
  }

  step();
}

map.on('click', async function(e){
  if(isMoving || isResting){
    log(isMoving ? "Ти рухаєшся" : "Ви відпочиваєте");
    return;
  }

  const from=playerMarker.getLatLng();
  const to={lat:e.latlng.lat,lng:e.latlng.lng};

  const route=await getRoute(from,to);
  const coords=drawRoute(route);

  move(coords);
});

// --- REST ---
function actionRest(){
  if(isMoving){ log("Ти рухаєшся"); return; }
  if(isResting){ log("Ви відпочиваєте"); return; }

  isResting=true;
  log("Ви відпочиваєте");

  let t=0;
  const int=setInterval(()=>{
    state.ap+=100/120;
    t++;

    if(state.ap>=100||t>=120){
      state.ap=100;
      clearInterval(int);
      isResting=false;
      log("Ви відновили сили");
    }

    updateStats();
  },1000);
}

// --- OSM ---
async function loadBuildings(lat, lon){
  const query = `
  [out:json];
  (
    node["building"](around:120,${lat},${lon});
    way["building"](around:120,${lat},${lon});
  );
  out center;
  `;
  const res = await fetch("https://overpass-api.de/api/interpreter", {
    method:"POST",
    body:query
  });
  const data = await res.json();
  return data.elements;
}

function nearPlayer(lat,lng){
  const p=playerMarker.getLatLng();
  return distance(p,{lat,lng}) < 150;
}

function mapBuilding(tags){
  if(tags.building==="warehouse" || tags.building==="industrial")
    return POI_TYPES.warehouse;
  return POI_TYPES.house;
}

// --- LOOK ---
async function actionLook(){
  if(isMoving){ log("Ти рухаєшся"); return; }
  if(isResting){ log("Ви відпочиваєте"); return; }

  const p=playerMarker.getLatLng();
  const key=`${p.lat.toFixed(3)}_${p.lng.toFixed(3)}`;

  if(visited[key]){
    log("Ви вже нічого нового не побачите");
    return;
  }

  visited[key]=true;

  log("Ви оглядаєтеся навколо...");

  const buildings = await loadBuildings(p.lat,p.lng);

  buildings.slice(0,6).forEach(b=>{
    const lat = b.lat || b.center.lat;
    const lon = b.lon || b.center.lon;

    const type = mapBuilding(b.tags || {});
    const poi = {name:type.name, used:false, lat, lon};

    const m=L.marker([lat,lon],{
      icon:L.icon({
        iconUrl:`images/poi/${type.img}`,
        iconSize:[32,32]
      })
    }).addTo(map);

    m.on('click',()=>{
      if(!nearPlayer(lat,lon)){
        log("Занадто далеко");
        return;
      }

      currentPOI = poi;
      openLoot();
    });

    poiList.push(poi);
  });

  log("Знайдено місць: "+Math.min(buildings.length,6));
}

// --- LOOT ---
function openLoot(){
  document.getElementById('lootScreen').style.display="flex";
  document.getElementById('lootTitle').innerText=currentPOI.name;
  document.getElementById('lootResult').innerText="";
  renderLootActions();
}

function renderLootActions(){
  const el=document.getElementById('lootActions');
  el.innerHTML="";

  const btn=document.createElement('button');
  btn.innerText="🔍 Обшукати";
  btn.onclick=lootSearch;
  el.appendChild(btn);
}

function closeLoot(){
  document.getElementById('lootScreen').style.display="none";
}

function hasKnife(){
  return state.inventory.includes("Ніж");
}

function lootSearch(){
  const resEl=document.getElementById('lootResult');

  if(currentPOI.used){
    resEl.innerText="Тут вже порожньо";
    return;
  }

  currentPOI.used=true;

  if(Math.random()<0.3){
    resEl.innerText="На вас напав агресивний безхатько!";

    const el=document.getElementById('lootActions');
    el.innerHTML="";

    const run=document.createElement('button');
    run.innerText="🏃 Втекти";
    run.onclick=()=>{
      if(Math.random()<0.5){
        resEl.innerText="Ви втекли";
      } else {
        state.hp-=20;
        updateStats();
        resEl.innerText="Вас вкусили (-20 HP)";
      }
      renderLootActions();
    };
    el.appendChild(run);

    if(hasKnife()){
      const fight=document.createElement('button');
      fight.innerText="🔪 Атакувати";
      fight.onclick=()=>{
        const i=state.inventory.indexOf("Ніж");
        state.inventory[i]=null;
        renderInventory();
        resEl.innerText="Ви відбилися і втекли";
        renderLootActions();
      };
      el.appendChild(fight);
    }

    return;
  }

  if(Math.random()<0.14){
    const item=items[Math.floor(Math.random()*items.length)];
    const i=state.inventory.findIndex(x=>x===null);

    if(i!==-1){
      state.inventory[i]=item;
      resEl.innerText="Знайдено: "+item;
    }
  } else {
    resEl.innerText="Нічого не знайдено";
  }

  renderInventory();
}

// INIT
updateStats();
renderInventory();
log("Готово до гри");

</script>
</body>
</html>
